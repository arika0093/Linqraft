name: .NET Build and Test (NativeAOT)

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - release/*
      - release-pr/*
    paths:
      - '**.csproj'
      - '**.cs'
      - '**./Directories.Build.props'
      - '.github/workflows/test-aot.yaml'

jobs:
  native-aot-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x

      - name: Set Target Frameworks .NET 
        run: echo 'TFMS=net8.0' >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish NativeAOT tests
        run: dotnet publish tests\Linqraft.Tests\Linqraft.Tests.csproj -c Release -o publish -f net8.0 -r win-x64 -p:EnableNativeAotTest=true --self-contained true

      - name: Run NativeAOT tests
        run: .\publish\Linqraft.Tests
