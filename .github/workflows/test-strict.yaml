name: .NET Build and Test (More Platforms)

on:
  workflow_dispatch:
  push:
    branches:
      - 'release-pr/*'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set Target Frameworks
        run: echo 'TFMS=net10.0;net8.0' >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Run tests
        run: dotnet test --solution Linqraft.slnx --no-build --verbosity normal

  native-aot-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            tfm: net10.0
          - os: ubuntu-latest
            rid: linux-x64
            tfm: net8.0
          - os: windows-latest
            rid: win-x64
            tfm: net10.0
          - os: macos-latest
            rid: osx-arm64
            tfm: net10.0

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            8.0.x

      - name: Set Target Frameworks
        run: echo 'TFMS=${{ matrix.tfm }}' >> $GITHUB_ENV

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish NativeAOT tests
        run: dotnet publish tests/Linqraft.Tests/Linqraft.Tests.csproj -c Release -o publish -f ${{ matrix.tfm }} -r ${{ matrix.rid }} -p:EnableNativeAotTest=true --self-contained true

      - name: Run NativeAOT tests
        run: ./publish/Linqraft.Tests
